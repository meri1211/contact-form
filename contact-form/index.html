<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome aboard form</title>

<body>

</header>
<section>

<section>

<button type="button">Send</button>
</section>
<footer>
    <ol>

 </body>
